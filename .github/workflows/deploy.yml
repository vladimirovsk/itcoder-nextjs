name: Build and Deploy web page

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        # NOTE: no NEXT_OUTPUT=export — the app has server-side /api/* route
        # handlers (project-builder, send-email) that a static export cannot run.
        # Production deploys via Vercel in server mode; this build mirrors that.
        env:
          NEXT_PUBLIC_API: "https://api-rest.it-coder.com/api/v1"
        run: npm run build

